<div class="page-wrap">
  <div class="page-title">
    <h1>GESTIÓN DE PRODUCTOS</h1>
    <div class="title-line"></div>
  </div>

  <div class="toolbar">
    <button class="btn btn-accent-soft" (click)="abrirModalNuevo()">+ Nuevo producto</button>
  </div>

  <div class="card-soft">
    <div class="card-soft-inner">
      <h2 class="section-title">Inventario en Tiempo Real</h2>

      <form [formGroup]="tablaForm">
        <div class="table-responsive">
          <table class="table-soft">
            <thead>
              <tr class="thead-top">
                <th rowspan="2">Material</th>
                <th rowspan="2">Inicial</th>
                <th colspan="3">Ventas</th>
                <th colspan="1">Compras</th>
                <th colspan="1">Saldo B1</th>
                <th colspan="4">Bodega 2</th>
                <th rowspan="2">Físico</th>
                <th rowspan="2">Total</th>
                <th rowspan="2" class="col-actions">Acciones</th>
              </tr>
              <tr class="thead-sub">
                <th>Cobrados</th>
                <th>Personal</th>
                <th>Repartos</th>
                <th>Entrada</th>
                <th>Final</th>
                <th>Exist.</th>
                <th>Ent.</th>
                <th>Sal.</th>
                <th>Saldo</th>
              </tr>
            </thead>

            <tbody formArrayName="filas">
              <tr *ngFor="let fila of filas.controls; let i=index" 
                  [formGroupName]="i" 
                  [attr.data-index]="i"
                  [class.row-alert]="getSaldoTotal(i) <= 10">
                
                <td>
                  <input formControlName="nombre" class="excel-input cell-strong text-left" 
                         (keydown)="moverAbajo($event, i, 'nombre')">
                </td>
                
                <td><input type="number" formControlName="b1InicialDia" class="excel-input" (keydown)="moverAbajo($event, i, 'b1InicialDia')"></td>
                <td><input type="number" formControlName="b1CobradosNoEntregados" class="excel-input" (keydown)="moverAbajo($event, i, 'b1CobradosNoEntregados')"></td>
                <td><input type="number" formControlName="b1SalidaPersonal" class="excel-input" (keydown)="moverAbajo($event, i, 'b1SalidaPersonal')"></td>
                <td><input type="number" formControlName="b1SalidaRepartos" class="excel-input" (keydown)="moverAbajo($event, i, 'b1SalidaRepartos')"></td>
                <td><input type="number" formControlName="b1EntradaBodega" class="excel-input" (keydown)="moverAbajo($event, i, 'b1EntradaBodega')"></td>
                <td class="num cell-strong bg-calc">{{ getSaldoB1(i) }}</td>

                <td><input type="number" formControlName="b2Existencia" class="excel-input" (keydown)="moverAbajo($event, i, 'b2Existencia')"></td>
                <td><input type="number" formControlName="b2Entrada" class="excel-input" (keydown)="moverAbajo($event, i, 'b2Entrada')"></td>
                <td><input type="number" formControlName="b2Salida" class="excel-input" (keydown)="moverAbajo($event, i, 'b2Salida')"></td>
                <td class="num cell-strong bg-calc">{{ getSaldoB2(i) }}</td>

                <td><input type="number" formControlName="inventarioFisicoFerreteria" class="excel-input" (keydown)="moverAbajo($event, i, 'inventarioFisicoFerreteria')"></td>
                
                <td class="num cell-strong" [style.color]="getSaldoTotal(i) <= 10 ? '#ef4444' : '#1f2a37'">
                  {{ getSaldoTotal(i) }}
                </td>

                <td class="actions">
                  <button class="icon-btn delete" type="button" (click)="eliminarDesdeTabla(productos[i])">🗑</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </form>
    </div>
  </div>
</div>

<div class="modal-backdrop-soft" *ngIf="modalOpen" (click)="cerrarModal()"></div>
<div class="modal-soft" *ngIf="modalOpen">
  <div class="modal-soft-header">
    <button class="back-btn" (click)="cerrarModal()">‹</button>
    <div class="modal-title">{{ modalTitle }}</div>
    <div class="header-dots"><span class="dot active"></span><span class="dot"></span><span class="dot"></span></div>
  </div>
  <div class="modal-soft-body">
    <div class="field"><label>Nombre</label><input class="field-input" [(ngModel)]="producto.nombre"></div>
    <div class="grid-2">
      <div class="field"><label>Categoría</label><input class="field-input" [(ngModel)]="producto.categoria"></div>
      <div class="field"><label>Unidad</label><input class="field-input" [(ngModel)]="producto.unidad"></div>
    </div>
  </div>
  <div class="modal-soft-footer">
    <button class="btn-link" (click)="cerrarModal()">Cancelar</button>
    <button class="btn btn-accent-solid" (click)="guardarDesdeModal()">Crear Producto</button>
  </div>
</div>
